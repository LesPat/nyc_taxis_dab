# Databricks Asset Bundle for NYC taxis ETL.
# See https://docs.databricks.com/dev-tools/bundles/index.html
bundle:
  name: nyc_taxis_dab
  uuid: 103e919b-2c38-44a9-830b-d9282676d1d6

include:
  - resources/*.yml

artifacts:
  python_artifact:
    type: whl
    build: uv build --wheel

variables:
  catalog:
    description: Project catalog
  silver_schema:
    description: Silver-layer tables
  gold_schema:
    description: Gold-layer tables
  taxi_s3_path:
    description: S3 path to raw taxi fare files (one folder; monthly files are combined automatically)
  weather_s3_path:
    description: S3 path to raw weather files (External Data)
  taxi_zone_lookup_table:
    description: Unity Catalog table for taxi zone lookup
  weather_codes_table:
    description: Unity Catalog reference table for weather condition codes
  weather_time_column:
    description: Hourly weather timestamp column used for joining taxi pickups

targets:
  dev:
    mode: development
    default: true
    workspace:
      host: https://dbc-c1f52266-9fee.cloud.databricks.com
    variables:
      catalog: nyc_taxi_fares_analysis
      silver_schema: silver_taxi_fares
      gold_schema: gold_taxi_fares
      taxi_s3_path: s3://nyc-taxis-traffic-analysis-raw/stg_taxis_data/
      weather_s3_path: s3://nyc-taxis-traffic-analysis-raw/weather/
      # Unity Catalog reference tables (full three-part names)
      taxi_zone_lookup_table: nyc_taxis_weather.bronze_nyc_taxis.b_taxi_zone_lookup
      weather_codes_table: nyc_taxis_weather.bronze_nyc_taxis.b_weather_codes
      weather_time_column: time
