# Orchestrates silver → gold pipeline runs.

resources:
  jobs:
    nyc_taxis_job:
      name: nyc_taxis_job
      tasks:
        - task_key: silver_pipeline
          pipeline_task:
            pipeline_id: ${resources.pipelines.nyc_taxis_etl.id}

        - task_key: gold_pipeline
          depends_on:
            - task_key: silver_pipeline
          pipeline_task:
            pipeline_id: ${resources.pipelines.nyc_taxis_gold.id}

      queue:
        enabled: true
