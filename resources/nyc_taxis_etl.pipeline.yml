# Lakeflow Spark Declarative Pipeline for NYC taxi ETL.

resources:
  pipelines:
    nyc_taxis_etl:
      name: nyc_taxis_etl
      catalog: ${var.catalog}
      schema: ${var.schema}
      serverless: true
      root_path: "../src/nyc_taxis_etl"

      configuration:
        taxi_s3_path: ${var.taxi_s3_path}
        weather_s3_path: ${var.weather_s3_path}
        taxi_pickup_column: ${var.taxi_pickup_column}
        weather_datetime_column: ${var.weather_datetime_column}

      libraries:
        - glob:
            include: ../src/nyc_taxis_etl/transformations/**

      environment:
        dependencies:
          - --editable ${workspace.file_path}
